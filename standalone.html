<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1b1410">
<title>JARL — Vikingatåg</title>
<style>
body{margin:0;background:#0d2229}
/* ============================================================
   JARL — stil (mobil-first, nordiskt: trä, pergament, guld)
   ============================================================ */
:root {
  --wood:    #1b1410;
  --wood2:   #2b2018;
  --parch:   #e9dcc3;
  --gold:    #f4d35e;
  --ink:     #efe6d4;
  --good:    #8fdc8f;
  --bad:     #ff8a76;
  --sea:     #0d2229;
  --rad:     14px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; height: 100%;
  background: var(--sea);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  overflow: hidden; user-select: none; -webkit-user-select: none;
  overscroll-behavior: none;
}

#app {
  display: flex; flex-direction: column;
  height: 100dvh;
}

/* ---------- HUD ---------- */
#hud {
  flex: none;
  display: flex; gap: 6px; align-items: stretch;
  padding: 8px 8px calc(8px + env(safe-area-inset-top, 0));
  padding-top: calc(8px + env(safe-area-inset-top, 0));
  background: linear-gradient(180deg, var(--wood), var(--wood2));
  border-bottom: 2px solid #000;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.chip {
  flex: 1 0 auto; min-width: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 5px 8px; border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(244,211,94,0.18);
}
.chip .ic  { font-size: 15px; line-height: 1; }
.chip .lab { font-size: 9px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.chip .val { font-size: 14px; font-weight: 700; color: var(--gold); margin-top: 1px; }

/* ---------- karta ---------- */
#mapwrap { position: relative; flex: 1 1 auto; min-height: 0; }
#map { display: block; width: 100%; height: 100%; touch-action: none; }

#zoomctl {
  position: absolute; left: 10px; top: 10px;
  display: flex; flex-direction: column; gap: 6px; z-index: 5;
}
#zoomctl button {
  width: 38px; height: 38px; border-radius: 10px;
  border: 1.5px solid rgba(244,211,94,0.45);
  background: rgba(27,20,16,0.82); color: var(--gold);
  font-size: 22px; font-weight: 700; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.4);
}
#zoomctl button:active { transform: translateY(1px); background: rgba(40,30,22,0.9); }

#log {
  position: absolute; left: 8px; right: 8px; top: 8px;
  display: flex; flex-direction: column; gap: 4px;
  pointer-events: none;
}
.logline {
  align-self: flex-start; max-width: 92%;
  background: rgba(15,20,16,0.82);
  border-left: 3px solid var(--gold);
  padding: 5px 9px; border-radius: 7px;
  font-size: 12.5px; line-height: 1.3;
  animation: slidein 0.25s ease;
}
.logline.good   { border-left-color: var(--good); }
.logline.bad    { border-left-color: var(--bad); }
.logline.system { border-left-color: #9fc7d6; }
@keyframes slidein { from { opacity: 0; transform: translateX(-8px);} to { opacity: 1; transform: none; } }

#endTurnBtn {
  position: absolute; right: 12px; bottom: 12px;
  padding: 13px 18px; border: none; border-radius: 30px;
  background: linear-gradient(180deg, #c0392b, #97271c);
  color: #fff; font-size: 15px; font-weight: 800;
  box-shadow: 0 5px 16px rgba(0,0,0,0.45);
  border: 1.5px solid rgba(244,211,94,0.55);
}
#endTurnBtn:disabled { opacity: 0.75; filter: grayscale(0.3); }
#endTurnBtn:active { transform: translateY(1px); }

/* ---------- nederpanel ---------- */
#panel {
  flex: none;
  background: linear-gradient(180deg, var(--wood2), var(--wood));
  border-top: 2px solid #000;
  padding: 10px 12px calc(12px + env(safe-area-inset-bottom, 0));
  min-height: 92px;
}
.hint { font-size: 13px; line-height: 1.45; opacity: 0.9; }
.ptitle { display: flex; align-items: center; gap: 8px; font-size: 17px; }
.ptitle .dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 0 2px rgba(0,0,0,0.4); }
.ptitle .ownr { margin-left: auto; font-size: 12px; opacity: 0.7; }

.stats { display: flex; gap: 6px; margin: 9px 0; flex-wrap: wrap; }
.stat {
  flex: 1 0 auto; display: flex; align-items: baseline; gap: 4px;
  background: rgba(255,255,255,0.05); border-radius: 8px; padding: 5px 8px;
  font-size: 11px;
}
.stat span { font-size: 13px; }
.stat b { color: var(--gold); font-size: 14px; }
.stat i { opacity: 0.6; font-style: normal; }

.actions { display: flex; gap: 8px; margin-bottom: 8px; }
.act {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px;
  padding: 10px 6px; border-radius: 10px; border: 1px solid rgba(244,211,94,0.3);
  background: rgba(244,211,94,0.10); color: var(--ink);
  font-size: 13.5px; font-weight: 700;
}
.act small { font-size: 10.5px; font-weight: 500; opacity: 0.7; }
.act:disabled { opacity: 0.4; }
.act:active:not(:disabled) { transform: translateY(1px); }

/* ---------- actionsheet ---------- */
#sheet {
  position: fixed; inset: 0; z-index: 30;
  display: flex; align-items: flex-end; justify-content: center;
  background: rgba(0,0,0,0.45);
}
#sheet.hidden, #overlay.hidden { display: none; }
.sheet-card {
  width: 100%; max-width: 520px;
  background: linear-gradient(180deg, #322519, #221913);
  border-top: 3px solid var(--gold);
  border-radius: 18px 18px 0 0;
  padding: 16px 16px calc(18px + env(safe-area-inset-bottom, 0));
  animation: rise 0.2s ease;
}
@keyframes rise { from { transform: translateY(40px); opacity: 0.4; } to { transform: none; opacity: 1; } }
.stitle { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
.sinfo { font-size: 13px; opacity: 0.85; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.sinfo .dot { width: 10px; height: 10px; border-radius: 50%; }
.slider { margin: 14px 0 6px; }
.slider label { font-size: 13px; opacity: 0.85; }
.slider label b { color: var(--gold); font-size: 16px; }
.slider input[type=range] { width: 100%; margin: 8px 0 4px; accent-color: var(--gold); height: 28px; }
.odds { font-size: 13px; font-weight: 700; }

.sbtns { display: flex; gap: 10px; margin: 10px 0; }
.big {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 14px 10px; border: none; border-radius: 13px;
  font-size: 15px; font-weight: 800; color: #fff;
  background: #444; border: 1.5px solid rgba(255,255,255,0.15);
}
.big small { font-size: 10.5px; font-weight: 500; opacity: 0.85; }
.big.raid   { background: linear-gradient(180deg, #d9822b, #a8631d); }
.big.invade { background: linear-gradient(180deg, #c0392b, #8f271d); border-color: rgba(244,211,94,0.5); }
.big:active { transform: translateY(1px); }
.cancel {
  width: 100%; padding: 11px; margin-top: 4px;
  background: transparent; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 11px; color: var(--ink); font-size: 14px; font-weight: 600;
}

/* ---------- overlay (intro / game over) ---------- */
#overlay {
  position: fixed; inset: 0; z-index: 40;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  background: radial-gradient(circle at 50% 30%, rgba(40,28,18,0.92), rgba(8,12,10,0.97));
  backdrop-filter: blur(3px);
}
.ov-card {
  width: 100%; max-width: 440px; text-align: center;
  background: linear-gradient(180deg, #322519, #1d150f);
  border: 1.5px solid rgba(244,211,94,0.4);
  border-radius: 20px; padding: 26px 22px;
  box-shadow: 0 14px 50px rgba(0,0,0,0.6);
}
.ov-card h1 {
  margin: 0 0 4px; font-size: 40px; letter-spacing: 5px; color: var(--gold);
  font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}
.ov-card .sub { margin: 0 0 16px; font-size: 14px; opacity: 0.8; }
.ov-card ul { text-align: left; margin: 0 0 20px; padding-left: 4px; list-style: none; }
.ov-card li { font-size: 14px; line-height: 1.7; }
.ov-stats { font-size: 14px; opacity: 0.85; margin-bottom: 18px; }
.ov-card .big { width: 100%; flex: none; }
</style>
</head>
<body>
<div id="app">
<header id="hud"></header>
<main id="mapwrap"><canvas id="map"></canvas><div id="log"></div><button id="endTurnBtn">⛵ Avsluta tur</button></main>
<footer id="panel"></footer>
</div>
<div id="sheet" class="hidden"></div>
<div id="overlay" class="hidden"></div>

// ============================================================
//  JARL — geo: Mercator-projektion, GeoJSON-parser, regioner
//  Läser riktig geografi (lng/lat) och projicerar till världsrymd
//  (0..WORLD_W × 0..WORLD_H). Voronoi-regioner kring städernas
//  verkliga lägen, begränsade och klippta mot kusten. Ingen DOM.
// ============================================================

const GEO = (function () {
  const D2R = Math.PI / 180;
  const mercY = lat => Math.log(Math.tan(Math.PI / 4 + lat * D2R / 2));

  const B = CONFIG.RENDER_BOUNDS;
  const mxW = B.w * D2R, mxE = B.e * D2R;
  const myN = mercY(B.n), myS = mercY(B.s);
  const projW = mxE - mxW, projH = myN - myS;
  const WORLD_W = CONFIG.WORLD_W;
  const WORLD_H = Math.round(WORLD_W * projH / projW);
  const R = CONFIG.REGION_RADIUS_DEG * WORLD_W / (B.e - B.w);   // regionradie i världsenheter

  function project(lng, lat) {
    return {
      x: (lng * D2R - mxW) / projW * WORLD_W,
      y: (myN - mercY(lat)) / projH * WORLD_H,
    };
  }
  function invert(x, y) {
    const mx = mxW + x / WORLD_W * projW;
    const my = myN - y / WORLD_H * projH;
    return { lng: mx / D2R, lat: (2 * Math.atan(Math.exp(my)) - Math.PI / 2) / D2R };
  }

  let landWorld = [];          // [{outer:[[x,y]...], holes:[[...]]}]
  const seedW = {};            // id -> {x,y}
  const CELLS = {};            // id -> regionpolygon (världskoord)
  const CENTROID = {};

  // ---- geometri ----
  function pointInRing(x, y, ring) {
    let inside = false;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
      if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
    }
    return inside;
  }
  function onLand(x, y) {
    for (const poly of landWorld) {
      if (!pointInRing(x, y, poly.outer)) continue;
      let hole = false;
      for (const h of poly.holes) if (pointInRing(x, y, h)) { hole = true; break; }
      if (!hole) return true;
    }
    return false;
  }
  // klipp polygon mot halvplanet (X-px)*nx+(Y-py)*ny <= 0
  function clipLine(poly, px, py, nx, ny) {
    const side = p => (p[0] - px) * nx + (p[1] - py) * ny;
    const out = [];
    for (let i = 0; i < poly.length; i++) {
      const a = poly[i], b = poly[(i + 1) % poly.length];
      const da = side(a), db = side(b);
      if (da <= 0) out.push(a);
      if ((da <= 0) !== (db <= 0)) { const t = da / (da - db); out.push([a[0] + t * (b[0] - a[0]), a[1] + t * (b[1] - a[1])]); }
    }
    return out;
  }
  function polyCentroid(poly) {
    let a = 0, cx = 0, cy = 0;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const f = poly[j][0] * poly[i][1] - poly[i][0] * poly[j][1];
      a += f; cx += (poly[j][0] + poly[i][0]) * f; cy += (poly[j][1] + poly[i][1]) * f;
    }
    a *= 0.5;
    if (Math.abs(a) < 1e-6) { let mx = 0, my = 0; poly.forEach(p => { mx += p[0]; my += p[1]; }); return [mx / poly.length, my / poly.length]; }
    return [cx / (6 * a), cy / (6 * a)];
  }

  function buildRegions() {
    const seeds = PROVINCES.map(p => ({ id: p.id, x: seedW[p.id].x, y: seedW[p.id].y }));
    const pad = 200;
    seeds.forEach(s => {
      let cell = [[-pad, -pad], [WORLD_W + pad, -pad], [WORLD_W + pad, WORLD_H + pad], [-pad, WORLD_H + pad]];
      // Voronoi: klipp mot bisektorerna mot alla andra städer
      seeds.forEach(o => {
        if (o.id === s.id) return;
        const mx = (s.x + o.x) / 2, my = (s.y + o.y) / 2;
        cell = clipLine(cell, mx, my, o.x - s.x, o.y - s.y);
      });
      // begränsa till en oktagon med radie R (så fjärran land förblir grått)
      for (let k = 0; k < 8; k++) {
        const ang = k * Math.PI / 4, nx = Math.cos(ang), ny = Math.sin(ang);
        cell = clipLine(cell, s.x + R * nx, s.y + R * ny, nx, ny);
      }
      CELLS[s.id] = cell;
      CENTROID[s.id] = cell.length >= 3 ? polyCentroid(cell) : [s.x, s.y];
    });
  }

  function setData(geojson) {
    landWorld = [];
    (geojson.features || []).forEach(f => {
      const g = f.geometry; if (!g) return;
      const polys = g.type === 'Polygon' ? [g.coordinates] : g.type === 'MultiPolygon' ? g.coordinates : [];
      polys.forEach(rings => {
        const pr = rings.map(ring => ring.map(c => { const w = project(c[0], c[1]); return [w.x, w.y]; }));
        if (pr.length && pr[0].length >= 3) landWorld.push({ outer: pr[0], holes: pr.slice(1) });
      });
    });
    PROVINCES.forEach(p => { seedW[p.id] = project(p.lng, p.lat); });
    buildRegions();
  }

  return {
    WORLD_W, WORLD_H,
    project, invert, setData, onLand,
    seedOf: id => seedW[id],
    cellOf: id => CELLS[id],
    centroidOf: id => CENTROID[id],
    land: () => landWorld,
    regionAt(x, y) {
      if (!onLand(x, y)) return null;
      let best = null, bd = R * R;
      PROVINCES.forEach(p => { const s = seedW[p.id]; const d = (s.x - x) * (s.x - x) + (s.y - y) * (s.y - y); if (d < bd) { bd = d; best = p.id; } });
      return best;
    },
    _ring: pointInRing,
  };
})();
// ============================================================
//  JARL — spelmotor: tillstånd, ekonomi, försörjning, strid, AI
//  Alla riken (vikingaätter + kristna kungariken) agerar och kan
//  kriga mot varandra. Sjöraid når kust utan att gränsa.
// ============================================================

const Engine = (function () {
  let adj = {};
  let state = null;
  const AI_IDS = FACTIONS.filter(f => f.id !== 'player' && f.kind !== 'neutral').map(f => f.id);
  const ECON_IDS = FACTIONS.filter(f => f.kind !== 'neutral').map(f => f.id);

  const rng = () => Math.random();
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

  function buildAdjacency() {
    adj = {};
    PROVINCES.forEach(p => { adj[p.id] = []; });
    EDGES.forEach(([a, b, sea]) => { adj[a].push({ id: b, sea }); adj[b].push({ id: a, sea }); });
  }

  function init() {
    buildAdjacency();
    const provinces = {};
    PROVINCES.forEach(p => { provinces[p.id] = Object.assign({}, p, { acted: false, recruited: 0 }); });
    const factions = {};
    FACTIONS.forEach(f => { factions[f.id] = Object.assign({}, f, { silver: 0, food: 0, renown: 0 }); });
    factions.player.silver = 150; factions.player.food = 55;
    AI_IDS.forEach(id => {
      const f = factions[id];
      f.silver = f.kind === 'christian' ? 110 : 90;
      f.food = f.kind === 'christian' ? 70 : 30;
    });
    state = { turn: 1, provinces, factions, selected: null, log: [], over: false, won: false, lastBattle: null };
    pushLog('☩ År 793. Långskeppen ligger redo. Led Ulfssons ätt till ära!', 'system');
    return state;
  }

  // ---- frågor ----
  const prov = id => state.provinces[id];
  const fac = id => state.factions[id];
  const neighbors = id => adj[id] || [];
  const isAdjacent = (a, b) => neighbors(a).some(n => n.id === b);
  const provincesOf = fid => Object.values(state.provinces).filter(p => p.owner === fid);
  const countOf = fid => provincesOf(fid).length;
  const warriorsOf = fid => provincesOf(fid).reduce((a, p) => a + p.garrison, 0);

  const tierOf = p => TIERS[Math.min(p.settlement, TIERS.length - 1)];
  const defMult = p => p.def + tierOf(p).def;
  const provinceIncome = p => p.income + tierOf(p).income;
  const provinceFood = p => p.food + tierOf(p).food;
  const recruitCap = p => tierOf(p).recruitCap;
  const buildCost = p => (p.settlement < CONFIG.MAX_SETTLEMENT ? TIERS[p.settlement + 1].cost : Infinity);
  const effectiveDefense = p => Math.round(p.garrison * defMult(p));

  const foodIncome = fid => provincesOf(fid).reduce((a, p) => a + provinceFood(p), 0);
  const supplyCap = fid => CONFIG.BASE_SUPPLY + foodIncome(fid);
  const upkeep = fid => warriorsOf(fid) * CONFIG.FOOD_PER_WARRIOR;
  const navalDist = (a, b) => {   // haversine, km
    const R = 6371, D = Math.PI / 180;
    const dLat = (b.lat - a.lat) * D, dLng = (b.lng - a.lng) * D;
    const h = Math.sin(dLat / 2) ** 2 + Math.cos(a.lat * D) * Math.cos(b.lat * D) * Math.sin(dLng / 2) ** 2;
    return 2 * R * Math.asin(Math.min(1, Math.sqrt(h)));
  };

  function pushLog(text, kind) { state.log.unshift({ text, kind: kind || 'info', turn: state.turn }); if (state.log.length > 80) state.log.pop(); }

  // ---- strid ----
  function battle(atk, def, dmult) {
    const ar = atk * (0.75 + rng() * 0.5);
    const dr = def * dmult * (0.75 + rng() * 0.5);
    const tot = (ar + dr) || 1;
    const atkLoss = clamp(Math.round(atk * (dr / tot) * 0.85), 0, atk);
    const defLoss = clamp(Math.round(def * (ar / tot) * 0.95), 0, def);
    return { atkSurv: atk - atkLoss, defSurv: def - defLoss, atkLoss, defLoss, win: ar >= dr };
  }

  // ---- handlingar ----
  function doInvade(srcId, tgtId, send) {
    const s = prov(srcId), t = prov(tgtId);
    send = clamp(send, 1, s.garrison); s.garrison -= send; s.acted = true;
    const res = battle(send, t.garrison, defMult(t));
    if (res.win && res.atkSurv > 0) {
      const wasChristian = t.type === 'christian';
      t.owner = s.owner; t.garrison = res.atkSurv; t.acted = true;
      const ren = wasChristian ? 45 : 20; fac(s.owner).renown += ren;
      state.lastBattle = { kind: 'invade', win: true, src: srcId, tgt: tgtId, res, ren };
      if (s.owner === 'player') pushLog(`⚔️ ${t.name} erövrat! ${res.atkLoss} stupade, ${res.atkSurv} håller landet. +${ren} ära.`, 'good');
    } else {
      s.garrison += res.atkSurv; t.garrison = res.defSurv;
      state.lastBattle = { kind: 'invade', win: false, src: srcId, tgt: tgtId, res, ren: 0 };
      if (s.owner === 'player') pushLog(`🛡️ Anfallet mot ${t.name} slogs tillbaka. ${res.atkLoss} stupade.`, 'bad');
    }
    return res;

    house(-13 * u, 6 * u, 11 * u, 9 * u, '#b4502f'); house(12 * u, 7 * u, 10 * u, 8 * u, '#9c4a2b'); if (lvl >= 1) house(-2 * u, 12 * u, 9 * u, 7 * u, '#a85230'); if (lvl >= 3) { house(21 * u, 11 * u, 8 * u, 7 * u, '#b4502f'); house(-21 * u, 10 * u, 8 * u, 7 * u, '#9c4a2b'); }
    let topY;
    if (p.type === 'christian') {
      const ch = (15 + lvl * 2) * u; ctx.fillStyle = '#efe7d4'; rrect(s.x - 5 * u, s.y - ch, 10 * u, ch + 2 * u, 1.5 * u); ctx.fill(); ctx.fillStyle = '#cdbf9e'; tri(s.x, s.y - ch - 8 * u, s.x - 6 * u, s.y - ch, s.x + 6 * u, s.y - ch);
      ctx.strokeStyle = '#6c5a3a'; ctx.lineWidth = Math.max(1, 1.6 * u); ctx.beginPath(); ctx.moveTo(s.x, s.y - ch - 15 * u); ctx.lineTo(s.x, s.y - ch - 8 * u); ctx.moveTo(s.x - 2.5 * u, s.y - ch - 12 * u); ctx.lineTo(s.x + 2.5 * u, s.y - ch - 12 * u); ctx.stroke(); topY = s.y - ch - 15 * u;
    } else {
      const kh = (17 + lvl * 2.6) * u, kw = (13 + lvl * 1.1) * u; if (lvl >= 4) [-1, 1].forEach(side => { const tx = s.x + side * (kw * 0.5 + 4 * u); ctx.fillStyle = '#aaa496'; rrect(tx - 3.5 * u, s.y - kh * 0.78, 7 * u, kh * 0.78 + 2 * u, 1.5 * u); ctx.fill(); ctx.fillStyle = '#8f897c'; ctx.fillRect(tx - 3.5 * u, s.y - kh * 0.78 - 2 * u, 7 * u, 2.5 * u); }); ctx.fillStyle = '#bdb6a6'; rrect(s.x - kw / 2, s.y - kh, kw, kh + 2 * u, 2 * u); ctx.fill(); ctx.fillStyle = '#a49d8c'; const teeth = Math.min(5, 3 + Math.floor(lvl / 2)); for (let i = 0; i < teeth; i++) ctx.fillRect(s.x - kw / 2 + i * (kw / teeth), s.y - kh - 3 * u, (kw / teeth) * 0.62, 3.5 * u); ctx.fillStyle = 'rgba(0,0,0,0.18)'; rrect(s.x - 2 * u, s.y - kh * 0.45, 4 * u, kh * 0.45, 1 * u); ctx.fill(); topY = s.y - kh - 3 * u;
    }
    const poleTop = topY - 12 * u; ctx.strokeStyle = '#5a4a32'; ctx.lineWidth = Math.max(1, 1.6 * u); ctx.beginPath(); ctx.moveTo(s.x + 9 * u, s.y - 12 * u); ctx.lineTo(s.x + 9 * u, poleTop); ctx.stroke(); ctx.fillStyle = f.color; ctx.beginPath(); ctx.moveTo(s.x + 9 * u, poleTop); ctx.lineTo(s.x + 22 * u, poleTop + 3 * u); ctx.lineTo(s.x + 9 * u, poleTop + 6 * u); ctx.closePath(); ctx.fill(); ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1; ctx.stroke();

  function drawLabel(p) {

    ctx.font = `600 ${fontPx}px system-ui, sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const yy = s.y - 30 * Math.max(0.5, scale * 1.15);

// ============================================================
//  JARL — HUD, paneler, inmatning, overlays
// ============================================================

const UI = (function () {
  let el = {};
  let pending = null;

  function $(id) { return document.getElementById(id); }

  function build() {
    el = { hud: $('hud'), panel: $('panel'), log: $('log'), sheet: $('sheet'), overlay: $('overlay'), endTurn: $('endTurnBtn') };
    el.endTurn.addEventListener('click', onEndTurn);
    setupMap($('map'));
    showIntro();
  }

  // tryck = välj region, dra = panorera, nyp/mushjul = zooma
  function setupMap(canvas) {
    const ptrs = new Map(); let last = null, moved = false, pinch = 0;
    const rel = e => { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };
    const pinchInfo = () => { const v = [...ptrs.values()]; return { d: Math.hypot(v[0].x - v[1].x, v[0].y - v[1].y), x: (v[0].x + v[1].x) / 2, y: (v[0].y + v[1].y) / 2 }; };
    canvas.addEventListener('pointerdown', e => { if (canvas.setPointerCapture) try { canvas.setPointerCapture(e.pointerId); } catch (x) {} const p = rel(e); ptrs.set(e.pointerId, p); last = p; moved = false; if (ptrs.size === 2) pinch = pinchInfo().d; });
    canvas.addEventListener('pointermove', e => {
      if (!ptrs.has(e.pointerId)) return; const p = rel(e); ptrs.set(e.pointerId, p);
      if (ptrs.size >= 2) { const m = pinchInfo(); if (pinch > 0) Render.zoomAt(m.d / pinch, m.x, m.y); pinch = m.d; moved = true; return; }
      if (last) { const dx = p.x - last.x, dy = p.y - last.y; if (Math.abs(dx) + Math.abs(dy) > 2) moved = true; if (moved) Render.panScreen(dx, dy); }
      last = p;
    });
    const up = e => {
      if (!ptrs.has(e.pointerId)) return; const p = ptrs.get(e.pointerId); ptrs.delete(e.pointerId);
      if (ptrs.size === 0) { if (!moved) onTap(p.x, p.y); last = null; }
      else { last = [...ptrs.values()][0]; pinch = 0; moved = true; }
    };
    canvas.addEventListener('pointerup', up);
    canvas.addEventListener('pointercancel', up);
    canvas.addEventListener('wheel', e => { e.preventDefault(); const p = rel(e); Render.zoomAt(e.deltaY < 0 ? 1.12 : 1 / 1.12, p.x, p.y); }, { passive: false });
    const zc = document.createElement('div'); zc.id = 'zoomctl';
    zc.innerHTML = '<button data-z="in" aria-label="Zooma in">+</button><button data-z="out" aria-label="Zooma ut">−</button>';
    (canvas.parentElement || canvas).appendChild(zc);
    zc.querySelectorAll('button').forEach(b => b.addEventListener('click', () => Render.zoomStep(b.dataset.z === 'in' ? 1.3 : 1 / 1.3)));
  }

  function onTap(sx, sy) {
    if (Engine.state.over) return;
    const picked = Render.pickProvince(sx, sy);
    if (!picked) { Engine.state.selected = null; refresh(); return; }
    const cur = Engine.state.selected;
    const targets = Render.validTargets(cur);
    if (cur && cur !== picked.id && targets[picked.id]) { openSheet(cur, picked.id, targets[picked.id]); return; }
    Engine.state.selected = picked.id; closeSheet(); refresh();
  }

  // ---------- HUD ----------
  function renderHUD() {
    const f = Engine.fac('player');
    const w = Engine.warriorsOf('player'), cap = Engine.supplyCap('player');
    const chips = [
      ['🗓️', 'Tur', Engine.state.turn, false],
      ['⚑', 'Land', `${Engine.countOf('player')}/${CONFIG.PROVINCES_TO_WIN}`, false],
      ['👑', 'Ära', `${f.renown}/${CONFIG.RENOWN_TO_WIN}`, false],
      ['🪙', 'Silver', f.silver, false],
      ['🌾', 'Mat', f.food, f.food <= 0],
      ['⚔️', 'Hird', `${w}/${cap}`, w >= cap],
    ];
    el.hud.innerHTML = chips.map(([ic, lab, val, warn]) =>
      `<div class="chip"><span class="ic">${ic}</span><span class="lab">${lab}</span><span class="val"${warn ? ' style="color:#ff8a76"' : ''}>${val}</span></div>`
    ).join('');
  }

  // ---------- nederpanel ----------
  function renderPanel() {
    const sel = Engine.state.selected;
    if (!sel) {
      el.panel.innerHTML = `<div class="hint">⚓ Tryck på en <b>röd</b> region (din ätt) för att välja den — tryck sedan på en granne för att raida, erövra eller flytta.</div>`;
      return;
    }
    const p = Engine.prov(sel), owner = Engine.fac(p.owner), mine = p.owner === 'player', tier = Engine.tierOf(p);
    const stats = [
      ['⚔️', p.garrison, 'krigare'],
      ['🏰', tier.name, 'nivå ' + p.settlement],
      ['🛡️', Engine.effectiveDefense(p), 'försvar'],
      ['🪙', Engine.provinceIncome(p), 'inkomst'],
      ['🌾', Engine.provinceFood(p), 'mat'],
      ['💰', p.loot, 'rovbyte'],
    ];
    const statsHtml = stats.map(([ic, v, lab]) => `<div class="stat"><span>${ic}</span><b>${v}</b><i>${lab}</i></div>`).join('');

    let actions = '';
    if (mine) {
      const f = Engine.fac('player');
      const w = Engine.warriorsOf('player'), cap = Engine.supplyCap('player');
      const canRecruit = p.recruited < Engine.recruitCap(p) && w + CONFIG.RECRUIT_BATCH <= cap && f.silver >= CONFIG.RECRUIT_SILVER && f.food >= CONFIG.RECRUIT_FOOD;
      const next = p.settlement < CONFIG.MAX_SETTLEMENT ? TIERS[p.settlement + 1] : null;
      const cost = Engine.buildCost(p);
      const canBuild = !!next && f.silver >= cost;
      const recruitHint = w >= cap ? '⚠️ Försörjningen full — bygg städer för fler krigare.'
        : (p.acted ? '⏳ Denna region har redan fört krig denna tur.' : '➡️ Tryck på en lysande granne: <b style="color:#ff8a76">röd = anfall</b>, <b style="color:#8fdc8f">grön = flytta hit</b>.');
      actions =
        `<div class="actions">
           <button class="act" data-a="recruit" ${canRecruit ? '' : 'disabled'}>⚒️ Rekrytera +${CONFIG.RECRUIT_BATCH}<small>${CONFIG.RECRUIT_SILVER}🪙 ${CONFIG.RECRUIT_FOOD}🌾</small></button>
           <button class="act" data-a="build" ${canBuild ? '' : 'disabled'}>${next ? `🏗️ ${next.name}<small>${cost}🪙</small>` : '🏰 Max nivå'}</button>
         </div>
         <div class="hint">${recruitHint}</div>`;
    } else {
      actions = `<div class="hint">Tillhör <b style="color:${owner.color}">${owner.name}</b>. Markera en av dina egna regioner intill för att anfalla.</div>`;
    }

    el.panel.innerHTML =
      `<div class="ptitle"><span class="dot" style="background:${owner.color}"></span><b>${p.name}</b><span class="ownr">${owner.name}${p.type === 'christian' ? ' ✝' : ''}</span></div>
       <div class="stats">${statsHtml}</div>${actions}`;
    el.panel.querySelectorAll('.act').forEach(b => b.addEventListener('click', () => onPanelAction(b.dataset.a, sel)));
  }

  function onPanelAction(a, provId) { const res = a === 'recruit' ? Engine.doRecruit(provId) : Engine.doBuild(provId); if (res && !res.ok) toast(res.msg, 'bad'); refresh(); }

  // ---------- actionsheet ----------
  function openSheet(srcId, tgtId, kind) {
    pending = { src: srcId, tgt: tgtId, kind };
    const s = Engine.prov(srcId), t = Engine.prov(tgtId), max = s.garrison, owner = Engine.fac(t.owner);
    const friend = kind === 'friend', naval = kind === 'naval';
    const title = friend ? `→ Flytta till ${t.name}` : naval ? `🌊 Sjöraid mot ${t.name}` : `⚔️ Mål: ${t.name}`;
    const targetInfo = friend
      ? `<div class="sinfo">${t.name} har ${t.garrison} krigare (din ätt).</div>`
      : `<div class="sinfo"><span class="dot" style="background:${owner.color}"></span> ${owner.name} &nbsp;·&nbsp; 🛡️ försvar <b>${Engine.effectiveDefense(t)}</b> &nbsp;·&nbsp; 💰 rovbyte <b>${t.loot}</b>${naval ? ' &nbsp;·&nbsp; 🌊 långskeppsled' : ''}</div>`;
    const btns = friend
      ? `<button class="big" data-do="march">→ Marschera hit</button>`
      : naval
        ? `<button class="big raid" data-do="raid">🔥 Raida (sjöväg)<small>plundra & segla hem</small></button>`
        : `<button class="big raid" data-do="raid">🔥 Raida<small>plundra silver, segla hem</small></button><button class="big invade" data-do="invade">⚔️ Erövra<small>besegra & ta landet</small></button>`;
    el.sheet.innerHTML =
      `<div class="sheet-card"><div class="stitle">${title}</div>${targetInfo}
         <div class="slider"><label>Skicka krigare: <b id="sval">${max}</b> / ${max}</label><input type="range" id="srange" min="1" max="${max}" value="${max}"><div class="odds" id="odds"></div></div>
         <div class="sbtns">${btns}</div><button class="cancel" data-do="cancel">Avbryt</button></div>`;
    el.sheet.classList.remove('hidden');
    const range = $('srange'), valEl = $('sval'), odds = $('odds');
    function updateOdds() {
      const send = +range.value; valEl.textContent = send;
      if (!friend) { const def = Engine.effectiveDefense(t); const ratio = def === 0 ? 99 : send / def; const verdict = ratio >= 1.6 ? '🟢 stark övermakt' : ratio >= 1.0 ? '🟡 jämn kamp' : '🔴 underläge'; odds.innerHTML = `⚔️ ${send} mot 🛡️ ${def} &nbsp; ${verdict}`; } else odds.textContent = '';
    }
    range.addEventListener('input', updateOdds); updateOdds();
    el.sheet.querySelectorAll('[data-do]').forEach(b => b.addEventListener('click', () => doSheet(b.dataset.do, +range.value)));
  }

  function doSheet(action, send) {
    const pn = pending; closeSheet();
    if (!pn || action === 'cancel') { refresh(); return; }
    if (action === 'march') Engine.doMarch(pn.src, pn.tgt, send);
    if (action === 'raid') Engine.doRaid(pn.src, pn.tgt, send, pn.kind === 'naval');
    if (action === 'invade') Engine.doInvade(pn.src, pn.tgt, send);
    Engine.state.selected = null; refresh();
  }
  function closeSheet() { pending = null; el.sheet.classList.add('hidden'); el.sheet.innerHTML = ''; }

  function renderLog() { const recent = Engine.state.log.slice(0, 4); el.log.innerHTML = recent.map(e => `<div class="logline ${e.kind}">${e.text}</div>`).join(''); }
  function toast(text, kind) { Engine.pushLog(text, kind || 'info'); renderLog(); }

  function onEndTurn() {
    if (Engine.state.over) return;
    closeSheet(); el.endTurn.disabled = true; el.endTurn.textContent = '⚔️ Fienderna drar ut...';
    setTimeout(() => { Engine.endPlayerTurn(); el.endTurn.disabled = false; el.endTurn.innerHTML = '⛵ Avsluta tur'; refresh(); if (Engine.state.over) showGameOver(); }, 280);
  }

  function showIntro() {
    el.overlay.innerHTML =
      `<div class="ov-card"><h1>JARL</h1><p class="sub">Vikingatåg över Norden · 793 e.Kr</p>
         <ul>
           <li>🔴 Du leder <b>Ulfssons ätt</b> i Vestfold och Hordaland.</li>
           <li>🌾 <b>Mat föder din här</b> — du kan inte hålla fler krigare än du kan föda. Svält ger desertering.</li>
           <li>🏗️ <b>Bygg städer</b> i 6 nivåer (Torp→Fästning) för mer inkomst, mat och försvar.</li>
           <li>⚔️ <b>Erövra</b> grannar och 🌊 <b>sjöraida</b> avlägsna kuster — långskeppen behöver ingen gräns.</li>
           <li>✝ De <b>kristna kungarikena</b> krigar mot varandra — slå till när de är svaga.</li>
           <li>👑 Vinn genom <b>${CONFIG.RENOWN_TO_WIN} ära</b> eller <b>${CONFIG.PROVINCES_TO_WIN} regioner</b>.</li>
         </ul>
         <button class="big invade" id="startBtn">⛵ Sätt segel</button></div>`;
    el.overlay.classList.remove('hidden');
    $('startBtn').addEventListener('click', () => { el.overlay.classList.add('hidden'); el.overlay.innerHTML = ''; });
  }

  function showGameOver() {
    const won = Engine.state.won;
    el.overlay.innerHTML =
      `<div class="ov-card"><h1>${won ? '👑 SEGER' : '☠️ NEDERLAG'}</h1><p class="sub">${won ? 'Skalderna sjunger om Ulfssons ätt i evig tid.' : 'Din saga är till ända.'}</p>
         <div class="ov-stats">Tur ${Engine.state.turn} · 👑 ${Engine.fac('player').renown} ära · ⚑ ${Engine.countOf('player')} regioner</div>
         <button class="big invade" id="againBtn">↻ Spela igen</button></div>`;
    el.overlay.classList.remove('hidden');
    $('againBtn').addEventListener('click', () => { el.overlay.classList.add('hidden'); el.overlay.innerHTML = ''; Engine.init(); Render.resize(); refresh(); });
  }

  function refresh() { renderHUD(); renderPanel(); renderLog(); }

  return { build, onTap, refresh };
})();
